<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玉結び — TAMAMUSUBI</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0a0a12; height: 100%; overflow: hidden; }
      #wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* フルブラウザ表示: アスペクト(25:14 ≈ 16:9)を保ったまま窓いっぱいに拡大 */
        width: min(100vw, calc(100vh * 400 / 224));
        height: auto;
        aspect-ratio: 400 / 224;
      }
    </style>
  </head>
  <body>
    <div id="wrap"><canvas id="game" width="3200" height="1792"></canvas></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
